<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon | Health is Wealth Gym</title>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: #0a0a0a;
  color: #fff;
  overflow: hidden;
}

/* Background glow */
.bg-glow {
  position: absolute;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(255,140,0,0.25), transparent 70%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  filter: blur(120px);
  z-index: 0;
}

/* Container */
.container {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* Logo */
.logo {
  width: 140px;
  margin-bottom: 30px;
  opacity: 0;
}

/* Gym Name */
.title {
  font-size: clamp(2.5rem, 6vw, 5rem);
  font-weight: 800;
  letter-spacing: 2px;
  text-align: center;
  background: linear-gradient(90deg, #ff8c00, #ffa500);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  opacity: 0;
}

/* Subtitle */
.subtitle {
  margin-top: 15px;
  font-size: 1.2rem;
  color: #aaa;
  letter-spacing: 2px;
  opacity: 0;
}

/* Owner */
.owner {
  margin-top: 30px;
  font-size: 1.1rem;
  color: #ff8c00;
  opacity: 0;
}

/* Coming soon text */
.coming {
  margin-top: 60px;
  font-size: 0.9rem;
  letter-spacing: 4px;
  color: #666;
  opacity: 0;
}

/* Animated line */
.line {
  width: 0;
  height: 2px;
  background: #ff8c00;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="container">
  
  <!-- Use your logo -->
  <img src="images/logotouser.png" class="logo" />

  <div class="title">Health is Wealth Gym</div>
  <div class="subtitle">COMING SOON</div>

  <div class="line"></div>

  <div class="owner">Yasir Ali Isani</div>

  <div class="coming">PREMIUM FITNESS EXPERIENCE</div>

</div>

<script>

// Timeline
const tl = gsap.timeline();

// Logo animation (rotation + fade)
tl.to(".logo", {
  opacity: 1,
  scale: 1,
  duration: 1,
  ease: "power3.out"
})
.to(".logo", {
  rotation: 360,
  duration: 6,
  repeat: -1,
  ease: "linear"
}, "-=1")

// Title
.to(".title", {
  opacity: 1,
  y: -10,
  duration: 1,
  ease: "power3.out"
}, "-=5")

// Subtitle
.to(".subtitle", {
  opacity: 1,
  y: -5,
  duration: 0.8
}, "-=4.5")

// Line animation
.to(".line", {
  width: 120,
  duration: 1,
  ease: "power2.out"
}, "-=4")

// Owner
.to(".owner", {
  opacity: 1,
  y: -5,
  duration: 1,
  ease: "power3.out"
}, "-=3.5")

// Coming text
.to(".coming", {
  opacity: 1,
  y: -5,
  duration: 1
}, "-=3")

// Subtle floating motion
gsap.to(".container", {
  y: 10,
  duration: 3,
  repeat: -1,
  yoyo: true,
  ease: "sine.inOut"
});

</script>

</body>
</html>
